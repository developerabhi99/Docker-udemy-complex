name: Deploy Complex

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          docker build -t abhijitshaw99/client-test -f ./client/Dockerfile.dev ./client
          docker run -e CI=true abhijitshaw99/client-test npm test

      - name: Build production images
        run: |
          docker build -t abhijitshaw99/multi-client ./client
          docker build -t abhijitshaw99/multi-worker ./worker
          docker build -t abhijitshaw99/multi-server ./server
          docker build -t abhijitshaw99/multi-nginx ./nginx

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push images to Docker Hub
        run: |
          docker push abhijitshaw99/multi-client
          docker push abhijitshaw99/multi-worker
          docker push abhijitshaw99/multi-server
          docker push abhijitshaw99/multi-nginx